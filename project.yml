name: Reword
options:
  bundleIdPrefix: com.polyconseil.alphonse
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0

targets:
  Reword:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Reword
    info:
      path: Reword/Info.plist
      properties:
        CFBundleDisplayName: Reword
        CFBundleShortVersionString: "0.2.2"
        CFBundleVersion: "4"
        LSUIElement: true
        NSAppleEventsUsageDescription: "Reword needs to send keyboard shortcuts (copy/paste) to the frontmost app to rephrase the selected text."
        CFBundleDevelopmentRegion: en
        NSHumanReadableCopyright: "© 2026 Alphonse Terrier"
    entitlements:
      path: Reword/Reword.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polyconseil.alphonse.Reword
        MARKETING_VERSION: "0.2.2"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: KeyboardShortcuts

  RewordTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: RewordTests
    settings:
      base:
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: Reword

schemes:
  Reword:
    build:
      targets:
        Reword: all
        RewordTests: [test]
    test:
      targets:
        - RewordTests
