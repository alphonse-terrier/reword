name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
# Builds Reword in Release, packages it as a DMG, and publishes it as a GitHub Release with the
# DMG attached — so anyone can download and run it without building from source.
#
# The DMG is ad-hoc signed (CI has no access to a paid Developer ID or the maintainer's local
# signing identity), so first launch requires right-click → Open to bypass Gatekeeper.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build and package DMG
        run: scripts/build-dmg.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            Reword-*.dmg \
            --title "Reword ${{ github.ref_name }}" \
            --generate-notes
